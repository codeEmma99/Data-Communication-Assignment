<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Telegraph system diagram</title>
  <desc id="desc">A sender telegraph key connected by wire to a receiver sounder and battery.</desc>
  <rect width="960" height="520" fill="#ffffff"/>
  <rect x="56" y="76" width="848" height="368" rx="18" fill="#f7f4ed" stroke="#d9dedf" stroke-width="3"/>
  <text x="480" y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#172026">Simple Telegraph Communication</text>

  <g transform="translate(115 165)">
    <rect x="0" y="120" width="230" height="58" rx="12" fill="#8b5e34"/>
    <rect x="46" y="64" width="138" height="24" rx="12" fill="#172026"/>
    <line x1="58" y1="76" x2="20" y2="120" stroke="#172026" stroke-width="12" stroke-linecap="round"/>
    <line x1="172" y1="76" x2="210" y2="120" stroke="#172026" stroke-width="12" stroke-linecap="round"/>
    <circle cx="52" cy="98" r="15" fill="#c08328"/>
    <circle cx="178" cy="98" r="15" fill="#c08328"/>
    <text x="115" y="215" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#172026">Sender Key</text>
    <text x="115" y="245" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#63707a">press to make pulses</text>
  </g>

  <g transform="translate(405 184)">
    <rect x="0" y="42" width="150" height="82" rx="12" fill="#0f766e"/>
    <rect x="18" y="22" width="114" height="34" rx="8" fill="#ffffff" opacity=".95"/>
    <line x1="42" y1="124" x2="42" y2="164" stroke="#172026" stroke-width="8" stroke-linecap="round"/>
    <line x1="108" y1="124" x2="108" y2="164" stroke="#172026" stroke-width="8" stroke-linecap="round"/>
    <text x="75" y="47" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#0c4a45">Battery</text>
    <text x="75" y="215" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#63707a">electrical power</text>
  </g>

  <g transform="translate(640 165)">
    <rect x="0" y="120" width="230" height="58" rx="12" fill="#8b5e34"/>
    <rect x="45" y="36" width="140" height="96" rx="16" fill="#2f6690"/>
    <rect x="72" y="62" width="86" height="44" rx="8" fill="#ffffff" opacity=".92"/>
    <line x1="62" y1="18" x2="168" y2="18" stroke="#172026" stroke-width="12" stroke-linecap="round"/>
    <line x1="115" y1="18" x2="115" y2="58" stroke="#172026" stroke-width="10" stroke-linecap="round"/>
    <text x="115" y="215" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#172026">Receiver Sounder</text>
    <text x="115" y="245" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#63707a">clicks become code</text>
  </g>

  <path d="M245 260 C335 130 625 130 715 260" fill="none" stroke="#bc4749" stroke-width="8" stroke-linecap="round"/>
  <path d="M245 310 C335 410 625 410 715 310" fill="none" stroke="#0f766e" stroke-width="8" stroke-linecap="round"/>
  <text x="480" y="139" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#bc4749">wire carries pulses</text>
  <text x="480" y="410" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f766e">return path completes circuit</text>

  <g font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#172026">
    <text x="384" y="260">dot</text>
    <text x="441" y="260">dash</text>
    <text x="520" y="260">dot</text>
  </g>
  <g fill="#c08328">
    <circle cx="365" cy="254" r="7"/>
    <rect x="430" y="248" width="48" height="12" rx="6"/>
    <circle cx="502" cy="254" r="7"/>
  </g>
</svg>
